name: Build Unsigned iOS IPA

on:
  workflow_dispatch: 

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout mã nguồn từ kho gốc
        uses: actions/checkout@v4
        with:
          repository: 'rak3n/SecuritySttream' # Ép GitHub kéo thẳng code gốc từ repo này về
          ref: 'main'                         # Lấy nhánh main mới nhất

      - name: Thiết lập Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          # Đã bỏ cache để tránh lỗi thiếu file lock của bạn

      - name: Cài đặt Dependencies của React Native
        run: npm install

      - name: Cài đặt CocoaPods (iOS)
        run: |
          cd ios
          pod install
          cd ..

      - name: Biên dịch ứng dụng bằng Xcode (Không ký)
        run: |
          xcodebuild -workspace ios/SecuritySttream.xcworkspace \
                     -scheme SecuritySttream \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build_output \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     clean build

      - name: Đóng gói thành file .ipa chưa ký
        run: |
          mkdir -p Payload
          cp -r build_output/Build/Products/Release-iphoneos/SecuritySttream.app Payload/
          zip -r SecuritySttream-unsigned.ipa Payload

      - name: Tải file .ipa lên Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SecuritySttream-Unsigned-IPA
          path: SecuritySttream-unsigned.ipa
          retention-days: 7
