name: Build Unsigned iOS IPA

on:
  workflow_dispatch: 

jobs:
  build-ios:
    runs-on: macos-14 # Đã hạ cấp xuống macOS 13 (Xcode 14) để tương thích với RN cũ

    steps:
      - name: Checkout mã nguồn từ kho gốc
        uses: actions/checkout@v4
        with:
          repository: 'rak3n/SecuritySttream' 
          ref: 'main'                         

      - name: Thiết lập Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cài đặt Dependencies của React Native
        run: npm install

      - name: Cấu hình Deployment Target và Cài đặt CocoaPods
        run: |
          cd ios
          sed -i '' "s/platform :ios, .*/platform :ios, '13.0'/g" Podfile
          pod cache clean --all
          pod install
          cd ..

      - name: Biên dịch ứng dụng bằng Xcode (Ép bỏ qua cảnh báo C++)
        run: |
          xcodebuild -workspace ios/SecurityStream.xcworkspace \
                     -scheme SecurityStream \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build_output \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     GCC_TREAT_WARNINGS_AS_ERRORS=NO \
                     OTHER_CFLAGS="-Wno-documentation" \
                     OTHER_CPLUSPLUSFLAGS="-Wno-documentation" \
                     clean build

      - name: Đóng gói thành file .ipa chưa ký
        run: |
          mkdir -p Payload
          cp -r build_output/Build/Products/Release-iphoneos/SecurityStream.app Payload/
          zip -r SecurityStream-unsigned.ipa Payload

      - name: Tải file .ipa lên Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SecurityStream-Unsigned-IPA
          path: SecurityStream-unsigned.ipa
          retention-days: 7 
